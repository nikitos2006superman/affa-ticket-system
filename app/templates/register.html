{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="auth-form">
    <h1>Регистрация участника</h1>
    <p class="auth-hint">
        Регистрация открыта для представителей дилерской сети и партнёров ООО Группа АФФА.
    </p>
    <form method="post">
        <label>
            Имя и фамилия *
            <input type="text" name="full_name" required autofocus>
        </label>
        <label>
            Email *
            <input type="email" name="email" required>
        </label>
        <label>
            Телефон
            <input type="tel" name="phone" placeholder="+7...">
        </label>
        <label>
            Организация
            <input type="text" name="organization" placeholder="Название вашей компании">
        </label>
        <label>
            Дилерский код
            <input type="text" name="dealer_code" placeholder="Например: D-1001">
            <small class="field-hint">Если у вас нет дилерского кода — оставьте поле пустым.</small>
        </label>
        <label>
            Пароль *
            <input type="password" name="password" required minlength="6">
        </label>
        <label>
            Повторите пароль *
            <input type="password" name="password_confirm" required minlength="6">
        </label>
        <button type="submit" class="btn btn-primary btn-lg">Зарегистрироваться</button>
    </form>
    <p class="auth-alt">
        Уже есть аккаунт? <a href="{{ url_for('auth.login') }}">Войти</a>
    </p>
</div>
{% endblock %}
